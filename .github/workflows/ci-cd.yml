name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  run-pipeline:
    uses: ArchGenTf/Main/.github/workflows/reusable-pipeline.yml@master
    with:
      service_name: "archgen-frontend"
      helm_dir: "frontend"
      image_repository_dev: "acrarchgendev.azurecr.io/frontend"
      image_repository_prod: "acrarchgenprod.azurecr.io/frontend"
      dockerfile_path: "./Dockerfile"
      smoke_test_port: "3000"
      smoke_test_endpoint: "/"
      lint_command: "npm install && npm run lint"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
